<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
    <script>
        (function() {
            // Pega tudo que vem depois da interrogação na URL
            const query = window.location.search;
            
            // Procura qualquer sequência de 11 números na URL (o CPF)
            const match = query.match(/\d{11}/);
            const cpf = match ? match[0] : null;

            if (cpf) {
                window.processarRetorno = function(data) {
                    if (data && data.redirectUrl) {
                        window.location.replace(data.redirectUrl);
                    }
                };

                const script = document.createElement('script');
                const apiBase = 'https://script.google.com/macros/s/AKfycbJ2O6lvd7uyQfDFp4STJU-1HlBiSxCY7daGAB1TJqC3N34QQhrtzxKwM58HZn4vplw/exec';
                
                // Envia o CPF limpo para o Google
                script.src = apiBase + '?cpf=' + cpf + '&callback=processarRetorno';
                document.body.appendChild(script);
            }
        })();
    </script>
</body>
</html>
