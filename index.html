<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="margin:0; padding:0; background:#ffffff;">
    <script>
        (function() {
            // Pega a URL completa
            const url = window.location.href;
            
            // Procura na URL qualquer sequência de exatamente 11 números
            // Isso ignora "?cpf=", "&<cpf>=" e qualquer outra tag que o sistema mande
            const match = url.match(/\d{11}/);
            const cpfEncontrado = match ? match[0] : null;

            if (cpfEncontrado) {
                // Função que o Google Script chama para abrir o AVA
                window.processarRetorno = function(data) {
                    if (data && data.redirectUrl) {
                        window.location.replace(data.redirectUrl);
                    }
                };

                const script = document.createElement('script');
                // URL da sua API no Google
                const apiBase = 'https://script.google.com/macros/s/AKfycbJ2O6lvd7uyQfDFp4STJU-1HlBiSxCY7daGAB1TJqC3N34QQhrtzxKwM58HZn4vplw/exec';
                
                // Envia apenas os 11 números limpos
                script.src = apiBase + '?cpf=' + cpfEncontrado + '&callback=processarRetorno';
                document.body.appendChild(script);
            }
        })();
    </script>
</body>
</html>
