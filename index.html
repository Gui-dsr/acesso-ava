<!DOCTYPE html>
<html>
<head><title>Redirecionando...</title></head>
<body>
    <p>Acessando o Ambiente Virtual... Aguarde.</p>
    <script>
        const params = new URLSearchParams(window.location.search);
        // Pega o CPF de qualquer lugar da URL
        let cpf = "";
        params.forEach((value) => {
            if (value && value.replace(/\D/g, '').length === 11) cpf = value.replace(/\D/g, '');
        });

        if (cpf) {
            // Função que o Google Script vai chamar de volta
            window.processarRetorno = function(data) {
                if (data.redirectUrl) {
                    window.location.replace(data.redirectUrl);
                } else {
                    alert("Erro: Aluno não localizado.");
                }
            };

            const script = document.createElement('script');
            const apiBase = 'https://script.google.com/macros/s/AKfycbJ2O6lvd7uyQfDFp4STJU-1HlBiSxCY7daGAB1TJqC3N34QQhrtzxKwM58HZn4vplw/exec';
            script.src = `${apiBase}?cpf=${cpf}&callback=processarRetorno`;
            document.body.appendChild(script);
        } else {
            document.body.innerHTML = "Erro: CPF não identificado.";
        }
    </script>
</body>
</html>
