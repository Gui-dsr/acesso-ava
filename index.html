<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="margin:0; padding:0; background:#ffffff;">
    <script>
        (function() {
            // Pega a parte da URL após a interrogação (?cpf=123...)
            const queryString = window.location.search;
            
            // Extrai apenas os números (remove o ?cpf= ou qualquer tag)
            const cpf = queryString.replace(/\D/g, '');

            if (cpf && cpf.length === 11) {
                // Função que recebe o link e pula para o AVA
                window.processarRetorno = function(data) {
                    if (data && data.redirectUrl) {
                        window.location.replace(data.redirectUrl);
                    }
                };

                const script = document.createElement('script');
                // URL da sua API no Google
                const apiBase = 'https://script.google.com/macros/s/AKfycbJ2O6lvd7uyQfDFp4STJU-1HlBiSxCY7daGAB1TJqC3N34QQhrtzxKwM58HZn4vplw/exec';
                
                // Manda o CPF para o Google processar o token
                script.src = apiBase + '?cpf=' + cpf + '&callback=processarRetorno';
                document.body.appendChild(script);
            } else {
                console.error("CPF inválido ou não encontrado na URL");
            }
        })();
    </script>
</body>
</html>
