<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="margin:0; padding:0; background:#ffffff;">
    <script>
        (function() {
            // Pega a URL completa da barra de endereços
            const urlCompleta = window.location.href;
            
            // Procura por qualquer sequência de 11 números (o CPF)
            const match = urlCompleta.match(/\d{11}/);
            const cpf = match ? match[0] : null;

            if (cpf) {
                // Função que recebe o link do Google e pula para o AVA
                window.processarRetorno = function(data) {
                    if (data && data.redirectUrl) {
                        window.location.replace(data.redirectUrl);
                    }
                };

                const script = document.createElement('script');
                // URL do seu Google Script (API)
                const apiBase = 'https://script.google.com/macros/s/AKfycbJ2O6lvd7uyQfDFp4STJU-1HlBiSxCY7daGAB1TJqC3N34QQhrtzxKwM58HZn4vplw/exec';
                
                // Manda o CPF limpo para o Google processar o token
                script.src = apiBase + '?cpf=' + cpf + '&callback=processarRetorno';
                document.body.appendChild(script);
            }
        })();
    </script>
</body>
</html>
